c"      /><h1 class="titulo-principal">Salvemos el Planeta</h1><p class="subtitulo">Únete a la revolución verde de GreenTech.</p><button class="btn-eco-redundante" type="button">        &#127807; Quiero ayudar      </button></div><footer class="footer">        GreenTech Solutions © <span id="anio-actual"></span> - Haciendo un mundo mejor      </footer><script>document.getElementById("anio-actual").textContent = new Date().getFullYear();</script></body></html>
